name: 速報ニュースチェック

on:
  schedule:
    # 30分おき。GitHub Actionsのscheduleは厳密な時刻保証はなく、
    # 数分のズレが生じることがある点に注意。
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: breaking-news-check
  cancel-in-progress: false

jobs:
  breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 速報チェックを実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  
        run: python src/breaking_main.py

      - name: 送信履歴をコミット
        run: |
          git config user.name "news-notifier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/sent_history.json
          git diff --staged --quiet || git commit -m "送信履歴を更新(速報チェック)"
          git push
