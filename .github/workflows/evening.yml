name: 夕方のニュースまとめ通知

on:
  schedule:
    # JST 18:00 = UTC 9:00
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 夕方のまとめ通知を実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
    
        run: python src/digest_main.py --label "夕" --hours 12

      - name: 送信履歴をコミット
        run: |
          git config user.name "news-notifier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/sent_history.json
          git diff --staged --quiet || git commit -m "送信履歴を更新(夕)"
          git push
